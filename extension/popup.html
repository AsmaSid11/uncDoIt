<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Site Guide</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <img class="logo" src="logo.png" width="32" height="32" alt="" />
      <div class="header-text">
        <h1>Site Guide</h1>
        <p class="tagline">POST /api/guide</p>
      </div>
    </header>
    <p class="hint">
      Describe your goal. The page is scanned for controls and sent to your
      UncDoIt backend for the next step (and optional voice).
    </p>
    <label class="field-label" for="intent">Goal</label>
    <div class="intent-row">
      <textarea
        id="intent"
        class="input intent"
        rows="3"
        placeholder="e.g. I want to apply for a new PAN"
        maxlength="2000"
      ></textarea>
      <button type="button" id="voice" class="btn voice" title="Speak your goal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
    </div>
    <p class="voice-hint" id="voiceHint">
      Mic records on the current tab’s page (allow the prompt for that site), then your
      backend transcribes it.
    </p>
    <label class="field-label" for="apiBase">API base URL</label>
    <input
      id="apiBase"
      class="input"
      type="url"
      spellcheck="false"
      placeholder="http://127.0.0.1:8000"
    />
    <button type="button" id="start" class="btn primary">Start guide</button>
    <button type="button" id="stop" class="btn secondary">Stop guide</button>
    <p id="status" class="status" role="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
